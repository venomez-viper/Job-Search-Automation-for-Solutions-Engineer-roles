name: Daily Job Hunt

on:
  schedule:
    # 8:00 AM Central Time = 14:00 UTC (winter/CST) / 13:00 UTC (summer/CDT)
    # Using 14:00 UTC to reliably cover CST (UTC-6). Adjust to 13:00 for CDT.
    - cron: '0 14 * * *'
  workflow_dispatch:   # also allows manual trigger from GitHub Actions tab

jobs:
  run-job-hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Restore seen_jobs.db from previous run ──────────────────────────
      # GitHub Actions has no persistent disk, so we store the DB as an artifact.
      - name: Download seen_jobs DB (if exists)
        uses: dawidd6/action-download-artifact@v3
        with:
          name: seen-jobs-db
          path: .
          if_no_artifact_found: warn   # First run: no artifact yet, that's OK
        continue-on-error: true

      - name: Run job hunt
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python main.py

      # ── Upload seen_jobs.db so next run can download it ─────────────────
      - name: Upload seen_jobs DB
        uses: actions/upload-artifact@v4
        if: always()   # upload even if the run partially failed
        with:
          name: seen-jobs-db
          path: seen_jobs.db
          retention-days: 90
          overwrite: true

      - name: Upload run log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: job-hunt-log-${{ github.run_number }}
          path: job_hunt.log
          retention-days: 14
          overwrite: true
