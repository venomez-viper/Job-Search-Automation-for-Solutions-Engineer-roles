name: Daily Job Hunt

on:
  schedule:
    # 8:00 AM Central Time = 14:00 UTC (winter/CST) / 13:00 UTC (summer/CDT)
    - cron: '0 14 * * *'
  workflow_dispatch:   # allows manual trigger from Actions tab

jobs:
  run-job-hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # needed to commit jobs_log.csv back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Restore seen_jobs.db from previous run ──────────────────────────
      - name: Download seen_jobs DB (if exists)
        uses: dawidd6/action-download-artifact@v3
        with:
          name: seen-jobs-db
          path: .
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Run job hunt
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
        run: python main.py

      # ── Commit jobs_log.csv back to repo (online log) ───────────────────
      - name: Commit updated jobs log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs_log.csv || true
          git diff --staged --quiet || git commit -m "chore: update jobs log [skip ci]"
          git push
        continue-on-error: true   # don't fail the run if nothing changed

      # ── Persist seen_jobs.db for next run ───────────────────────────────
      - name: Upload seen_jobs DB
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: seen-jobs-db
          path: seen_jobs.db
          retention-days: 90
          overwrite: true

      - name: Upload run log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: job-hunt-log-${{ github.run_number }}
          path: job_hunt.log
          retention-days: 14
          overwrite: true
